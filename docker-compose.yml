services:
  pitch-showcase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polisys-pitch-showcase
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3010/coding/pitch-showcase"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
