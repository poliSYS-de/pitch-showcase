services:
  pitch-showcase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polisys-pitch-showcase
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - ./docs:/docs:ro
      - ./task-details:/task-details:ro
      - ./task-liste.md:/task-liste.md:ro
      - ./task-liste-archiv.md:/task-liste-archiv.md:ro
      - ./docs-registry.json:/app/docs-registry.json:ro
      - ./deck-config.json:/app/deck-config.json
      - ./assets.json:/app/assets.json
      - ./public/images/upload:/app/public/images/upload
    environment:
      - NODE_ENV=production
      - PORT=3010
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3010"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
